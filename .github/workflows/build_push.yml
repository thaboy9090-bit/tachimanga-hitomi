name: Build and Publish Extensions

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle wrapper JAR
        run: |
          curl -L "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate launcher icons
        run: |
          pip install Pillow -q
          python3 << 'EOF'
          from PIL import Image
          import os, glob
          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          for ext_dir in glob.glob('src/*/*'):
              for dpi, size in sizes.items():
                  path = f"{ext_dir}/res/{dpi}"
                  os.makedirs(path, exist_ok=True)
                  icon = f"{path}/ic_launcher.png"
                  if not os.path.exists(icon):
                      Image.new('RGB', (size, size), (229, 115, 115)).save(icon)
                      print(f"Created {icon}")
          EOF

      - name: Build APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Collect and rename APKs
        run: |
          mkdir -p repo/apk
          for apk in $(find . -path "*/build/outputs/apk/debug/*.apk"); do
            path_parts=$(echo "$apk" | sed 's|./src/||')
            lang=$(echo "$path_parts" | cut -d'/' -f1)
            src=$(echo "$path_parts" | cut -d'/' -f2)
            version_code=$(grep 'extVersionCode' src/$lang/$src/build.gradle | grep -o '[0-9]*')
            version="1.4.$version_code"
            dest="repo/apk/tachiyomi-$lang.$src-v$version.apk"
            cp "$apk" "$dest"
            echo "Copied: $apk → $dest"
          done

      - name: Collect icons
        run: |
          mkdir -p repo/icon
          for ext_dir in src/*/*; do
            lang=$(echo "$ext_dir" | cut -d'/' -f2)
            src=$(echo "$ext_dir" | cut -d'/' -f3)
            icon="$ext_dir/res/mipmap-xxxhdpi/ic_launcher.png"
            if [ -f "$icon" ]; then
              cp "$icon" "repo/icon/$lang.$src.png"
              echo "Copied icon: $lang.$src"
            fi
          done

      - name: Generate index.min.json
        run: python scripts/generate_index.py

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: repo
          publish_dir: ./repo
          force_orphan: false
          keep_files: true
          commit_message: "Update repo [skip ci]"
